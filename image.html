<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Image Search</title>

</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-container">
        <div class="header-left">
            <!-- This is a place holder for future header add ons-->
        </div>
        <div class="header-right">
            <a href="index.html" class="header-link">back to search</a>
        </div>
    </div>
</header>


<!-- Image Search Form -->
<form id="image-form" action="https://www.google.com/search" class="image-search-form">
    <div class="google-text-container">
         <img id="image-header-text" src="google_image.png" alt="Logo" width="272" height="92">
    
    <!-- Blue "Images" text under logo -->
    <p class="logo-subtext">Images</p>
    </div>
   

    <!-- Search input -->
    <input id="input-image-text" type="text" name="q" placeholder="Search Images">
    <input type="hidden" name="tbm" value="isch">
    
    <div class="buttons">
        <input type="submit" value="Google Search">
    </div>
</form>

<footer>
    <div class="footer">
        <div class="footer-container"> 
            <!-- Footer placeholder-->
        </div>
    </div>

</footer>

</body>
</html>
