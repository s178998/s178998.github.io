<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Image Search</title>

</head>
<body>

<!-- Header -->
<header class="image-header">
    <div class="image-header-container">
        <div class="image-header-left">
            <!-- This is a place holder for future header add ons-->
        </div>
        <div class="image-header-right">
            <a href="index.html" class="image-header-link">back to search</a>
        </div>
    </div>
</header>


<!-- Image Search Form -->
<form action="https://www.google.com/search" class="image-search-form">
    <div class="google-text-container">
         <img id="image-header-text" src="google_image.png" alt="Logo" width="272" height="92">
    
    <!-- Blue "Images" text under logo -->
    <p class="logo-subtext">Images</p>
    </div>
   

    <!-- Search input -->
    <input id="image-input-text" type="text" name="q" placeholder="Search Images">
    <input type="hidden" name="tbm" value="isch">
    
    <div class="image-buttons">
        <input type="submit" value="Google Search">
    </div>
</form>

<footer>
    <div class="image-footer">
        <div class="image-footer-container">
            <div class="image-footer-left-links">
                <a href="https://about.google/?utm_source=google-US&utm_medium=referral&utm_campaign=hp-footer&fg=1">
                    <div class="image-left-link1">About</div></a>

                <a href="https://business.google.com/us/google-ads/?subid=ww-ww-et-g-awa-a-g_hpafoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpafooter&fg=1"><div class="image-left-link2">Advertising</div><a>

                <a href="https://business.google.com/us/business-profile/?subid=ww-ww-et-g-awa-a-g_hpbfoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpbfooter&fg=1"><div class="image-left-link3">Business</div></a>

                <a href="https://www.google.com/search/howsearchworks/?fg=1"><div class="image-left-link4">How Search works</div><a>
                    
            </div>
            <div class="image-footer-right-links">
                <a href="https://policies.google.com/privacy?hl=en&fg=1"><div class="image-right-link1">Privacy</div></a>
                <a href="https://policies.google.com/terms?hl=en&fg=1"><div class="image-right-link2">Terms</div></a>
                <a href="advanced.html"><div class="image-right-link3">Settings</div></a>
            </div>
        </div>
    </div>
</footer>

</body>
</html>
